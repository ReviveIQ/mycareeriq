<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>MyCareerIQ — AI Job Search Pipeline | Resume-Matched Roles, Contacts & Outreach</title>
    <meta name="description" content="MyCareerIQ builds your job search pipeline automatically. Upload your resume, get fit-scored roles from real company job boards, find recruiter contacts, and generate outreach — all in one place. Powered by AI." />
    <meta name="keywords" content="job search pipeline, AI job search, resume job match, job tracker, career pipeline, job search automation, recruiter contact finder, cover letter generator, ATS job board" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mycareeriq.reviveiqi.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mycareeriq.reviveiqi.com" />
    <meta property="og:title" content="MyCareerIQ — AI Job Search Pipeline" />
    <meta property="og:description" content="Stop spraying and praying. MyCareerIQ researches companies hiring for your specific roles, scores each job against your resume, finds the right contact, and drafts your outreach. Your pipeline builds while you sleep." />
    <meta property="og:image" content="https://mycareeriq.reviveiqi.com/og-image.png" />
    <meta property="og:site_name" content="MyCareerIQ by ReviveIQI" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyCareerIQ — AI Job Search Pipeline" />
    <meta name="twitter:description" content="Upload your resume. Get fit-scored job matches from real ATS boards. Find recruiter contacts. Generate outreach. Track your pipeline. All automated." />
    <meta name="twitter:image" content="https://mycareeriq.reviveiqi.com/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MyCareerIQ",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "AI-powered job search pipeline. Automatically researches companies hiring for your roles, scores job fit against your resume, finds recruiter contacts, and generates personalized outreach.",
      "url": "https://mycareeriq.reviveiqi.com",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier: 3 research runs per month"
      },
      "provider": {
        "@type": "Organization",
        "name": "ReviveIQI",
        "url": "https://reviveiqi.com"
      },
      "featureList": [
        "Resume-matched job research",
        "ATS job board integration",
        "Fit scoring against resume",
        "Recruiter contact enrichment",
        "Cover letter generation",
        "Pipeline stage tracking",
        "Daily automated research"
      ]
    }
    </script>

    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=DM+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>

    <div id="root"></div>
